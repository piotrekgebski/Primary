name: Rollback Staging

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Image ref to deploy, e.g. ghcr.io/piotrekgebski/primary-app:sha-abc123..."
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Roll back over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.STAGING_HOST }}
          username: ${{ vars.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ vars.STAGING_PORT }}
          command_timeout: 15m
          script: |
            IMAGE_REF="${{ inputs.image_ref }}"
            STATE_DIR="/opt/primary/rollback"

            mkdir -p "$STATE_DIR"
            docker pull "$IMAGE_REF"
            docker stop primary-staging-app || true
            docker rm primary-staging-app || true
            docker run -d \
              --name primary-staging-app \
              --restart unless-stopped \
              -p 8000:8000 \
              "$IMAGE_REF"

            for i in {1..10}; do
              if curl --fail http://localhost:8000/health; then
                echo "$IMAGE_REF" > "$STATE_DIR/current_image"
                exit 0
              fi
              echo "Rollback health check failed, retrying in 3 seconds..."
              sleep 3
            done

            echo "Rollback target did not become healthy in time"
            docker ps -a
            docker logs primary-staging-app
            exit 1
