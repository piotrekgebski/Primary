name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: Primary

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Show workflow context
        run: |
          echo "App: ${{ env.APP_NAME }}"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Show workflow context
        run: |
          echo "App: ${{ env.APP_NAME }}"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Show workflow context
        run: |
          echo "App: ${{ env.APP_NAME }}"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports
        run: python -c "from main import app; print('Build check OK')"

      - name: Compile Python files
        run: python -m compileall .

      - name: Prepare build artifact
        run: |
          mkdir -p build-output
          cp main.py requirements.txt pyproject.toml build-output/
          echo "app=${{ env.APP_NAME }}" > build-output/build-info.txt
          echo "branch=${{ github.ref_name }}" >> build-output/build-info.txt
          echo "sha=${{ github.sha }}" >> build-output/build-info.txt
          echo "event=${{ github.event_name }}" >> build-output/build-info.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: primary-build
          path: build-output
          retention-days: 7
