name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: Primary
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -q

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show build metadata
        run: |
          echo "App: $APP_NAME"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Verify app import
        run: python -c "from main import app; print('Build check OK')"

      - name: Compile Python files
        run: python -m compileall .

      - name: Prepare build artifact
        run: |
          mkdir -p build-output
          cp main.py requirements.txt pyproject.toml build-output/
          echo "app=${{ env.APP_NAME }}" > build-output/build-info.txt
          echo "python_version=${{ env.PYTHON_VERSION }}" >> build-output/build-info.txt
          echo "branch=${{ github.ref_name }}" >> build-output/build-info.txt
          echo "sha=${{ github.sha }}" >> build-output/build-info.txt
          echo "event=${{ github.event_name }}" >> build-output/build-info.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: primary-build
          path: build-output
          retention-days: 7

  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/piotrekgebski/primary-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref_name == 'main'
    timeout-minutes: 15
    environment:
      name: staging
      url: http://52.57.90.234:8000

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.STAGING_HOST }}
          username: ${{ vars.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ vars.STAGING_PORT }}
          command_timeout: 15m
          script: |
            IMAGE_REF="ghcr.io/piotrekgebski/primary-app:sha-${{ github.sha }}"
            STATE_DIR="$HOME/primary/rollback"

            mkdir -p "$STATE_DIR"

            if docker ps -a --format '{{.Names}}' | grep -q '^primary-staging-app$'; then
              docker inspect --format='{{.Config.Image}}' primary-staging-app > "$STATE_DIR/previous_image"
            fi

            docker pull "$IMAGE_REF"
            docker stop primary-staging-app || true
            docker rm primary-staging-app || true
            docker run -d \
              --name primary-staging-app \
              --restart unless-stopped \
              -p 8000:8000 \
              "$IMAGE_REF"

            for i in {1..10}; do
              if curl --fail http://localhost:8000/health; then
                echo "$IMAGE_REF" > "$STATE_DIR/current_image"
                exit 0
              fi
              echo "Health check failed, retrying in 3 seconds..."
              sleep 3
            done

            echo "Application did not become healthy in time"
            docker ps -a
            docker logs primary-staging-app
            exit 1

  deploy-T530:
    name: Deploy to T530
    runs-on: self-hosted
    needs: docker-build
    if: github.event_name == 'push' && github.ref_name == 'main'
    timeout-minutes: 15
    environment:
      name: T530
      url: http://192.168.50.250:8000

    steps:
      - name: Deploy locally on T530
        run: |
            docker pull ghcr.io/piotrekgebski/primary-app:latest
            docker stop primary-T530-app || true
            docker rm primary-T530-app || true
            
            docker run -d \
              --name primary-T530-app \
              --restart unless-stopped \
              -p 8000:8000 \
              ghcr.io/piotrekgebski/primary-app:latest

            for i in {1..10}; do
              if curl --fail http://localhost:8000/health; then
                exit 0
              fi
              echo "Health check failed, retrying in 3 seconds..."
              sleep 3
            done

            echo "Application did not become healthy in time"
            docker ps -a
            docker logs primary-staging-app
            exit 1

  smoke-test:
    name: Smoke Test from T530
    runs-on: [self-hosted, Linux, X64]
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref_name == 'main'
    timeout-minutes: 10
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }} 

    steps:     
      - name: Run external smoke test from T530
        run: |
          for i in {1..10}; do
            if curl --fail --connect-timeout 3 --max-time 5 "${{ vars.STAGING_URL }}/health"; then
              exit 0
            fi
            echo "External smoke test failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "Staging is not reachable from T530"
          exit 1            
